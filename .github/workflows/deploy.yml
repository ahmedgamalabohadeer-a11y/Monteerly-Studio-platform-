name: Monteerly CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    # - name: Run Tests (Uncomment when tests are added)
    #   run: npm run test

    - name: Build Project
      run: npm run build
      env:
        NEXT_TELEMETRY_DISABLED: 1
